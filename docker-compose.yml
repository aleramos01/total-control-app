services:
  postgres:
    image: postgres:16-alpine
    container_name: total-control-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: total_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d total_control"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
